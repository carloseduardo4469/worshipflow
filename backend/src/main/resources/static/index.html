<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="WorshipFlow, MVP para gestão de ministério de louvor." />
    <meta name="theme-color" content="#10243f" />
    <title>WorshipFlow | Gestão de Louvor</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/LogoWorshipFlowIcon.png" />
    <script>
      const auth = localStorage.getItem("worshipflow:auth");
      const hash = location.hash.replace("#/", "").split("?")[0];
      const query = location.hash.split("?")[1] || "";

      if (hash === "redefinir-senha") {
        location.replace(`/pages/redefinir-senha.html?${query}`);
      } else if (hash === "register") {
        location.replace("/pages/cadastro.html");
      } else if (hash === "forgot") {
        location.replace("/pages/esqueci-senha.html");
      } else if (hash === "termos") {
        location.replace("/pages/termos.html");
      } else if (hash === "privacidade") {
        location.replace("/pages/privacidade.html");
      } else if (auth) {
        location.replace("/pages/dashboard.html");
      } else {
        location.replace("/pages/login.html");
      }
    </script>
  </head>
  <body>
    <noscript>Este aplicativo precisa de JavaScript para funcionar.</noscript>
  </body>
</html>
