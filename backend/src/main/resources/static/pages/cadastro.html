<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Cadastro no WorshipFlow." />
    <meta name="theme-color" content="#10243f" />
    <title>WorshipFlow | Cadastro</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/icon-192.png" />
    <script>document.documentElement.dataset.theme = "light";</script>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/js/api.js" defer></script>
    <script src="/js/common.js" defer></script>
    <script src="/js/cadastro.js" defer></script>
  </head>
  <body>
    <main class="login-page">
      <div class="auth-page-inner">
        <section class="auth-card auth-accent-left" aria-label="Cadastro no WorshipFlow">
          <aside class="auth-hero-panel">
            <span class="auth-brand-mark">WF</span>
            <h2>Já faz parte da equipe?</h2>
            <p>Entre com sua conta para acompanhar escalas, ensaios e repertórios.</p>
            <a class="button outline-light" href="/pages/login.html">Entrar</a>
          </aside>

          <section class="auth-form-panel">
            <div class="auth-title">
              <span class="auth-logo">WF</span>
              <h1>Criar conta</h1>
            </div>
            <form id="cadastro-form" class="auth-form auth-form-register">
              <label><span>Nome</span><input name="nome" autocomplete="name" placeholder="Nome completo" required /></label>
              <label><span>E-mail</span><input name="email" type="email" autocomplete="email" placeholder="Digite seu e-mail" required /></label>
              <label><span>Senha</span><input name="senha" type="password" autocomplete="new-password" minlength="8" placeholder="Mínimo de 8 caracteres" required /></label>
              <label><span>Telefone</span><input name="telefone" type="text" inputmode="numeric" autocomplete="tel" maxlength="30" pattern="[0-9]*" placeholder="Opcional" /></label>
              <label><span>Instrumento principal</span><input name="instrumentoPrincipal" maxlength="80" placeholder="Ex.: violão, teclado, voz" /></label>
              <label><span>Habilidades</span><textarea name="habilidades" maxlength="300" placeholder="Ex.: violão, baixo, bateria"></textarea></label>
              <button class="button primary auth-submit" type="submit">Cadastrar</button>
              <p class="auth-consent">Ao criar conta, você concorda com os <a href="/pages/termos.html">Termos de Uso</a> e <a href="/pages/privacidade.html">Política de Privacidade</a>.</p>
            </form>
          </section>
        </section>
      </div>
    </main>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
  </body>
</html>
