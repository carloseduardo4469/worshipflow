<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Redefinição de senha do WorshipFlow." />
    <meta name="theme-color" content="#10243f" />
    <title>WorshipFlow | Nova senha</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/LogoWorshipFlowIcon.png" />
    <script>
      const theme = localStorage.getItem("worshipflow:theme") || "dark"; document.documentElement.classList.toggle("dark", theme === "dark"); document.documentElement.dataset.theme = theme;
    </script>
    <link rel="stylesheet" href="/css/style.css?v=89" />
    <script src="/js/api.js" defer></script>
    <script src="/js/common.js?v=83" defer></script>
    <script src="/js/redefinir-senha.js" defer></script>
  </head>
  <body>
    <button class="wf-icon-button public-theme-toggle" type="button" data-action="toggle-theme" aria-label="Alternar tema"></button>
    <main class="login-page">
      <div class="auth-page-inner">
        <section class="auth-card auth-accent-right" aria-label="Nova senha">
          <section class="auth-form-panel auth-form-panel-narrow">
            <div class="auth-title">
              <img class="auth-logo wf-logo-image" src="/assets/LogoWorshipFlowIcon.png" alt="" width="48" height="48" />
              <p class="wf-label auth-eyebrow auth-eyebrow-gold">Nova credencial</p>
              <h1>Nova senha</h1>
            </div>
            <p class="auth-subtitle">Cadastre uma nova senha com pelo menos 8 caracteres para proteger sua conta.</p>
            <form id="redefinir-senha-form" class="auth-form">
              <input name="token" type="hidden" />
              <label>
                <span>Nova senha</span>
                <input name="novaSenha" type="password" autocomplete="new-password" minlength="8" placeholder="Mínimo de 8 caracteres" required />
              </label>
              <label>
                <span>Confirmar senha</span>
                <input name="confirmarNovaSenha" type="password" autocomplete="new-password" minlength="8" placeholder="Repita a nova senha" required />
              </label>
              <button class="button primary auth-submit" type="submit">Salvar senha</button>
            </form>
            <div class="auth-links compact">
              <a href="/pages/login.html">Voltar para login</a>
            </div>
          </section>

          <aside class="auth-hero-panel">
            <img class="auth-brand-mark wf-logo-image" src="/assets/LogoWorshipFlowIcon.png" alt="" width="48" height="48" />
            <h2>Segurança restaurada.</h2>
            <p>Atualize sua senha e retorne ao painel do WorshipFlow com acesso protegido.</p>
            <a class="button outline-light" href="/pages/login.html">Entrar</a>
          </aside>
        </section>
        <footer class="auth-utility-footer">
          <nav aria-label="Links do rodapé">
            <a href="/pages/termos.html">Termos de Uso</a>
            <a href="/pages/privacidade.html">Privacidade</a>
            <a href="/pages/termos.html#contato">Contato</a>
            <button type="button" data-action="back-to-top">Voltar ao topo</button>
          </nav>
        </footer>
      </div>
    </main>
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
  </body>
</html>
