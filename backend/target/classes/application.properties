spring.application.name=worshipflow-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/worshipflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:8080}
app.auth.expose-reset-link=${EXPOSE_RESET_LINK:false}
app.password-reset.provider=${PASSWORD_RESET_PROVIDER:auto}
app.mail.from=${MAIL_FROM:noreply@worshipflow.local}
app.supabase.url=${SUPABASE_URL:}
app.supabase.anon-key=${SUPABASE_ANON_KEY:${SUPABASE_PUBLISHABLE_KEY:}}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}
